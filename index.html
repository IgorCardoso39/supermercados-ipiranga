<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermercados Ipiranga | Mercado de bairro na 26 de Setembro</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Nosso CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Cabeçalho -->
  <header class="header-custom py-3">
    <section class="container d-flex justify-content-between align-items-center">
      <h1 class="h3 text-white">Supermercados Ipiranga</h1>
      <button class="btn btn-light btn-carrinho" type="button" data-bs-toggle="offcanvas" data-bs-target="#carrinhoOffcanvas">
        🛒 <span id="contador-carrinho">0</span>
      </button>
    </section>
  </header>

  <!-- Navegação -->
  <nav class="navbar navbar-expand-lg nav-custom">
    <section class="container">
      <a class="navbar-brand fw-bold" href="#">Início</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <section class="navbar-toggler-icon"></section>
      </button>
      <section class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#produtos">Produtos</a></li>
        </ul>
      </section>
    </section>
  </nav>

  <!-- Conteúdo principal -->
  <main class="container my-4">

    <!-- Seção Sobre -->
    <section id="sobre" class="mb-5 p-4 bg-light rounded shadow-sm">
      <h2>Bem-vindo ao Supermercados Ipiranga</h2>
      <p class="lead">Qualidade e preço baixo perto de você! Monte sua lista de compras online e simule seu carrinho.</p>
    </section>

    <!-- Seção Produtos -->
    <section id="produtos">
      <h2 class="mb-3">Nossos Produtos</h2>
      <section class="row" id="lista-produtos">
        <!-- Os produtos serão inseridos via JavaScript -->
      </section>
    </section>

    <!-- Rodapé -->
    <footer class="mt-5 pt-3 border-top text-center text-muted">
      <p>&copy; 2026 Supermercados Ipiranga - Desenvolvido para estudo</p>
    </footer>

  </main>

  <!-- Offcanvas do Carrinho (Bootstrap) -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="carrinhoOffcanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Seu Carrinho</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul id="itens-carrinho" class="list-group mb-3">
        <!-- Itens dinâmicos -->
      </ul>
      <p><strong>Total: R$ <span id="total-carrinho">0,00</span></strong></p>
      <button id="finalizar-compra" class="btn btn-success w-100">Finalizar Compra</button>
      <button id="limpar-carrinho" class="btn btn-outline-danger w-100 mt-2">Limpar Carrinho</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Nosso JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
